<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Memo Viewer</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --line: #e7e7e3;
            --text: #1f1f1c;
            --muted: #6b6f76;
            --accent: #1f2f68;
            --accent-hover: #17224b;
            --danger: #b42318;
            --success: #16764f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 8% 0%, #eef1fa 0, transparent 32%), var(--bg);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: 100%;
            max-width: 540px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
            padding: 24px;
        }

        .kicker {
            margin: 0;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
        }

        h1 {
            margin: 8px 0 8px;
            font-size: 28px;
            line-height: 1.2;
        }

        .desc {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.45;
        }

        .field {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #2f3440;
            font-weight: 600;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 11px 12px;
            font: inherit;
            color: var(--text);
            background: #fff;
            outline: none;
        }

        input:focus {
            border-color: #9eb0e7;
            box-shadow: 0 0 0 3px rgba(31, 47, 104, 0.12);
        }

        button {
            width: 100%;
            margin-top: 4px;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            border-radius: 10px;
            padding: 11px 14px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .msg {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            margin-top: 12px;
            display: none;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.ok {
            border-color: #cde7dc;
            background: #effaf5;
            color: var(--success);
        }

        .msg.err {
            border-color: #f0cfcc;
            background: #fff4f2;
            color: var(--danger);
        }
    </style>
</head>
<body>
    <main class="panel">
        <p class="kicker">Leakage Bot</p>
        <h1>Admin Memo Visit</h1>
        <p class="desc">
            Input format is strictly <code>uuid</code> or <code>uuid/uuid</code>.
            Bot logs in as admin and opens that memo path.
        </p>

        <form id="botForm">
            <div class="field">
                <label for="path">Memo Path</label>
                <input
                    type="text"
                    id="path"
                    name="path"
                    placeholder="uuid or uuid/uuid"
                    pattern="^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}(\/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})?$"
                    required>
            </div>
            <button type="submit">Send Bot</button>
        </form>

        <div class="msg ok" id="successMsg"></div>
        <div class="msg err" id="errorMsg"></div>
    </main>

    <script>
        const form = document.getElementById("botForm");
        const successMsg = document.getElementById("successMsg");
        const errorMsg = document.getElementById("errorMsg");

        function hideMessages() {
            successMsg.style.display = "none";
            errorMsg.style.display = "none";
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            hideMessages();

            const path = document.getElementById("path").value.trim();

            const params = new URLSearchParams();
            params.set("path", path);

            try {
                const response = await fetch("/visit", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: params.toString()
                });

                const text = await response.text();
                if (response.ok) {
                    successMsg.textContent = text;
                    successMsg.style.display = "block";
                } else {
                    errorMsg.textContent = text;
                    errorMsg.style.display = "block";
                }
            } catch (error) {
                errorMsg.textContent = "Request failed: " + error.message;
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
